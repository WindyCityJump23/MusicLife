name: Deploy

on:
  push:
    branches: [main]

jobs:
  quality-gates:
    name: Build, Evals, and Diagnostics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm --prefix web ci

      - name: Run web unit tests
        run: npm --prefix web test

      - name: Build web
        run: npm --prefix web run build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install API dependencies
        working-directory: api
        run: pip install -r requirements-dev.txt

      - name: Run API unit tests
        working-directory: api
        run: python -m pytest

      - name: Run recommendation evals
        working-directory: api
        run: python -m evals.run_evals --suite ranking,songs,context,synthesis --json /tmp/musiclife-evals.json

      - name: Run static ranking diagnostics
        working-directory: api
        run: |
          python - <<'PY'
          from app.services.ranking_diagnostics import run_diagnostics
          report = run_diagnostics(run_static=True, run_runtime=False).as_dict()
          summary = report["summary"]
          print(summary)
          if summary["errors"] or summary["warnings"]:
              raise SystemExit(f"static diagnostics failed: {summary}")
          PY

  deploy-web:
    name: Deploy Web to Vercel
    needs: quality-gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check required secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          missing=""
          [ -z "$VERCEL_TOKEN" ] && missing="$missing VERCEL_TOKEN"
          [ -z "$VERCEL_ORG_ID" ] && missing="$missing VERCEL_ORG_ID"
          [ -z "$VERCEL_PROJECT_ID" ] && missing="$missing VERCEL_PROJECT_ID"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing. Add them in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

  deploy-api:
    name: Deploy API to Render
    needs: quality-gates
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "::error::Missing required secret: RENDER_DEPLOY_HOOK. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Trigger Render Deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" --fail-with-body -w "\nHTTP Status: %{http_code}\n"

  post-deploy-smoke:
    name: Post-deploy Smoke Checks
    needs: [deploy-web, deploy-api]
    runs-on: ubuntu-latest
    steps:
      - name: Check production endpoints
        env:
          PRODUCTION_WEB_URL: ${{ secrets.PRODUCTION_WEB_URL }}
          PRODUCTION_API_URL: ${{ secrets.PRODUCTION_API_URL }}
        run: |
          PRODUCTION_WEB_URL="${PRODUCTION_WEB_URL:-https://music-life-kappa.vercel.app}"
          PRODUCTION_API_URL="${PRODUCTION_API_URL:-https://musiclife-api.onrender.com}"

          echo "Checking web: $PRODUCTION_WEB_URL"
          echo "Checking API: $PRODUCTION_API_URL"

          web_status=$(curl --silent --show-error --output /dev/null --write-out "%{http_code} %{time_total}" --max-time 20 "$PRODUCTION_WEB_URL/")
          web_code=${web_status%% *}
          web_time=${web_status##* }
          echo "web_home status=$web_code time=${web_time}s"
          if [ "$web_code" -lt 200 ] || [ "$web_code" -ge 400 ]; then
            echo "::error::web home returned $web_code"
            exit 1
          fi

          readiness_status=$(curl --silent --show-error --output /dev/null --write-out "%{http_code} %{time_total}" --max-time 20 "$PRODUCTION_WEB_URL/api/readiness")
          readiness_code=${readiness_status%% *}
          readiness_time=${readiness_status##* }
          echo "web_readiness status=$readiness_code time=${readiness_time}s"
          if [ "$readiness_code" -ge 500 ]; then
            echo "::error::/api/readiness returned $readiness_code"
            exit 1
          fi

          schema_report=$(curl --fail --silent --show-error --max-time 20 "$PRODUCTION_WEB_URL/api/radio-health/schema")
          echo "radio_schema_health=$schema_report"
          SCHEMA_REPORT="$schema_report" node - <<'NODE'
          const report = JSON.parse(process.env.SCHEMA_REPORT || "{}");
          if (!report.ok) {
            console.error("Radio schema health failed", report);
            process.exit(1);
          }
          NODE

          # Render deploy hooks return before the replacement instance is ready.
          # Wait for that restart, then measure a separate warm request so the
          # latency gate still catches an unhealthy steady-state API.
          api_status=""
          api_code="000"
          api_time="0"
          for attempt in 1 2 3 4 5 6; do
            api_status=$(curl --silent --show-error --output /dev/null --write-out "%{http_code} %{time_total}" --max-time 30 "$PRODUCTION_API_URL/health" || true)
            api_code=${api_status%% *}
            api_time=${api_status##* }
            echo "api_health attempt=$attempt status=${api_code:-000} time=${api_time:-timeout}s"
            if [ -n "$api_status" ] && [ "$api_code" -ge 200 ] && [ "$api_code" -lt 400 ]; then
              break
            fi
            sleep 10
          done
          if [ -z "$api_status" ] || [ "$api_code" -lt 200 ] || [ "$api_code" -ge 400 ]; then
            echo "::error::API health did not recover after Render deploy"
            exit 1
          fi

          warm_api_status=$(curl --silent --show-error --output /dev/null --write-out "%{http_code} %{time_total}" --max-time 20 "$PRODUCTION_API_URL/health")
          warm_api_code=${warm_api_status%% *}
          warm_api_time=${warm_api_status##* }
          echo "api_health_warm status=$warm_api_code time=${warm_api_time}s"
          if [ "$warm_api_code" -lt 200 ] || [ "$warm_api_code" -ge 400 ]; then
            echo "::error::Warm API health returned $warm_api_code"
            exit 1
          fi
          API_HEALTH_TIME="$warm_api_time" node - <<'NODE'
          const seconds = Number(process.env.API_HEALTH_TIME || "0");
          if (seconds > 15) {
            console.error(`Warm API health was too slow: ${seconds.toFixed(3)}s`);
            process.exit(1);
          }
          NODE

          diagnostics_report=$(curl --fail --silent --show-error --max-time 30 -X POST "$PRODUCTION_API_URL/diagnostics/ranking/static")
          echo "static_diagnostics=$diagnostics_report"
          DIAGNOSTICS_REPORT="$diagnostics_report" node - <<'NODE'
          const report = JSON.parse(process.env.DIAGNOSTICS_REPORT || "{}");
          const summary = report.summary || {};
          if ((summary.errors || 0) > 0 || (summary.warnings || 0) > 0) {
            console.error("Static diagnostics failed", summary);
            process.exit(1);
          }
          NODE
