name: Editorial refresh

# Keeps the editorial signal fresh automatically. The sources crawl
# (RSS + Reddit -> mentions -> new artists/tracks -> embeddings + a bounded
# Last.fm similar-artist expansion) previously only ran when someone clicked
# "Refresh sources" — mentions were weeks stale. The weekly stats step
# converges Last.fm listener stats for artists added since the last run.
#
# Setup: requires the SUPABASE_SERVICE_ROLE_KEY repo secret (the FastAPI
# bearer auth accepts the service key for trusted server-to-server calls).
# API_URL is an optional repo variable (defaults to the Render URL).
#
# Like keepalive.yml, failures emit warnings rather than failing the
# workflow — this is an automation, not a monitor.

on:
  schedule:
    - cron: "17 11 * * *" # daily, 11:17 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  refresh-sources:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sources ingest and poll to completion
        env:
          API_URL: ${{ vars.API_URL || 'https://musiclife-api.onrender.com' }}
          SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SERVICE_KEY" ]; then
            echo "::warning::SUPABASE_SERVICE_ROLE_KEY secret is not set — skipping editorial refresh. Add it under Settings > Secrets and variables > Actions."
            exit 0
          fi

          # Render free tier may need a cold start; retry the trigger.
          resp=$(curl --silent --show-error --retry 3 --retry-delay 20 --max-time 90 \
            -X POST "$API_URL/ingest/sources" \
            -H "Authorization: Bearer $SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d '{}') || { echo "::warning::sources trigger failed"; exit 0; }

          job_id=$(echo "$resp" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("job_id",""))' 2>/dev/null || echo "")
          if [ -z "$job_id" ]; then
            echo "::warning::no job_id in response: $resp"
            exit 0
          fi
          echo "sources job: $job_id"

          # Poll up to ~25 minutes.
          for i in $(seq 1 50); do
            sleep 30
            status_json=$(curl --silent --max-time 30 \
              -H "Authorization: Bearer $SERVICE_KEY" \
              "$API_URL/ingest/status/$job_id" || echo '{}')
            state=$(echo "$status_json" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("status","unknown"))' 2>/dev/null || echo unknown)
            message=$(echo "$status_json" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("message",""))' 2>/dev/null || echo "")
            echo "[poll $i] $state — $message"
            case "$state" in
              success) exit 0 ;;
              failed) echo "::warning::sources job failed: $message"; exit 0 ;;
              unknown) echo "::warning::lost track of sources job"; exit 0 ;;
            esac
          done
          echo "::warning::sources job still running after 25 minutes (it may finish on its own)"

  lastfm-stats-weekly:
    # Converge listener stats for artists added since the last pass.
    # Cheap when nothing is missing (the job only selects NULL rows).
    if: github.event_name == 'workflow_dispatch' || github.run_number % 7 == 0
    runs-on: ubuntu-latest
    needs: refresh-sources
    steps:
      - name: Trigger Last.fm stats backfill
        env:
          API_URL: ${{ vars.API_URL || 'https://musiclife-api.onrender.com' }}
          SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SERVICE_KEY" ]; then
            echo "::warning::SUPABASE_SERVICE_ROLE_KEY secret is not set — skipping."
            exit 0
          fi
          curl --silent --show-error --retry 3 --retry-delay 20 --max-time 90 \
            -X POST "$API_URL/ingest/backfill-lastfm-stats" \
            -H "Authorization: Bearer $SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d '{}' || echo "::warning::stats backfill trigger failed"
