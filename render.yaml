services:
  - type: web
    name: musiclife-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: VOYAGE_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: LASTFM_API_KEY
        sync: false
      - key: MUSICBRAINZ_USER_AGENT
        value: musiclife/1.0 (contact@musiclife.app)
      - key: EMBEDDING_PROVIDER
        value: voyage
      - key: EMBEDDING_MODEL
        value: voyage-3
      - key: EMBEDDING_DIMS
        value: "1024"
      - key: CORS_ORIGINS
        sync: false
